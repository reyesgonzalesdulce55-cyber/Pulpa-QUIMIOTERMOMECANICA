<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Registro | Pulpa CTMP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="contenedor-registro">
    <div class="formulario-registro">
        <h2 class="titulo-registro">Crear cuenta</h2>

        <form action="bienvenida.html">
            <input type="text" name="nombre" class="input-registro" placeholder="Nombre completo" required>
            <input type="email" name="correo" class="input-registro" placeholder="Correo electronico" required>
            <input type="password" name="password" class="input-registro" placeholder="Contraseña" required>
            <input type="text" name="pais" class="input-registro" placeholder="Pais" required>
            <input type="tel" name="telefono" class="input-registro" placeholder="Telefono" required>
            <button type="submit" class="boton-registro">Registrarse</button>
        </form>

        <div class="texto-extra">
            Al registrarte aceptas los terminos y condiciones
        </div>
    </div>
</div>

</body>
</html>
